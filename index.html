<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>推し活</title>

  <style>
    body {
      margin: 0;
      background: #fff5f7;
      font-family: system-ui, sans-serif;
    }

    /* ヘッダー */
    .header {
      width: 100%;
      padding: 14px 18px;
      background: linear-gradient(90deg, #ff7b9c, #ff4f6e);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-size: 20px;
    }

    .nav {
      display: flex;
      gap: 16px;
      font-size: 15px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    /* カレンダー */
    .calendar-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 10px;
      color: #d6335b;
    }

    .calendar-nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 16px;
      font-weight: 700;
      color: #ff4f6e;
    }

    .calendar-nav div {
      cursor: pointer;
    }

    .calendar-header {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #333;
    }

    /* カレンダー全体 */
    .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border: 2px solid #ffb6c6;   /* 外枠 */
    border-collapse: collapse;
    }

    /* カレンダーのマス（格子状） */
    .calendar-grid div {
    border: 1px solid #ffb6c6;   /* 格子の線 */
    background: #fff;
    font-size: 22px;
    font-weight: 600;
    height: 120px;               /* ← 縦を大きく固定（崩れない） */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding-top: 8px;
    position: relative;
    box-sizing: border-box;
    }

    /* 曜日 */
    .weekday {
    background: #ffe3ea;
    font-weight: 700;
    border: 1px solid #ffb6c6;
    height: 60px;                /* 曜日だけ少し低く */
    font-size: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    }

    /* 予定表示（下に固定） */
    .calendar-event {
    font-size: 12px;
    background: #ff7b9c;
    color: white;
    padding: 3px 6px;
    border-radius: 6px;
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 90%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    }


    /* ポップアップ共通 */
    .date-popup-bg,
    .schedule-popup-bg,
    .schedule-list-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    .date-popup,
    .schedule-popup,
    .schedule-list {
      background: white;
      width: 85%;
      max-width: 320px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .date-popup-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #d6335b;
    }

    .date-popup-btn {
      width: 100%;
      padding: 12px 0;
      margin-bottom: 10px;
      background: #ff7b9c;
      color: white;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .date-popup-btn.cancel {
      background: #aaa;
    }

    .schedule-popup input,
    .schedule-popup textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ffb6c6;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffe3ea;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .schedule-item button {
      background: #ff4f6e;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-title">推し活</div>
    <div class="nav">
      <div>ホーム</div>
      <div>グッズ一覧</div>
      <div>交換</div>
    </div>
  </div>

  <!-- ホーム（カレンダー） -->
  <div class="container">

    <div class="calendar-title">カレンダー</div>

    <div class="calendar-nav">
      <div onclick="prevMonth()">&lt; 前の月</div>
      <div onclick="nextMonth()">次の月 &gt;</div>
    </div>

    <div class="calendar-header" id="calendarHeader"></div>

    <div class="calendar-grid" id="calendarGrid"></div>

  </div>

  <!-- 日付メニュー -->
  <div class="date-popup-bg" id="dateMenu">
    <div class="date-popup">
      <div class="date-popup-title" id="dateMenuDate"></div>

      <div class="date-popup-btn" onclick="openAddSchedule()">追加</div>
      <div class="date-popup-btn" onclick="openScheduleList()">確認</div>
      <div class="date-popup-btn cancel" onclick="closeAllPopups()">キャンセル</div>
    </div>
  </div>

  <!-- 予定追加 -->
  <div class="schedule-popup-bg" id="addSchedulePopup">
    <div class="schedule-popup">
      <div class="date-popup-title">予定を追加</div>

      <input id="scheduleTitle" placeholder="タイトル">
      <textarea id="scheduleMemo" placeholder="メモ（任意）"></textarea>

      <div class="popup-btns">
        <div class="date-popup-btn cancel" onclick="closeAllPopups()">閉じる</div>
        <div class="date-popup-btn" onclick="saveSchedule()">登録</div>
      </div>
    </div>
  </div>

  <!-- 予定確認 -->
  <div class="schedule-list-bg" id="scheduleListPopup">
    <div class="schedule-list">
      <div class="date-popup-title" id="scheduleListDate"></div>

      <div id="scheduleListBox"></div>

      <div class="date-popup-btn cancel" onclick="closeAllPopups()">閉じる</div>
    </div>
  </div>

  <script>
    const week = ["日","月","火","水","木","金","土"];
    let current = new Date();
    let selectedDate = "";
    let schedules = {};

    function renderCalendar() {
      const year = current.getFullYear();
      const month = current.getMonth();

      document.getElementById("calendarHeader").textContent =
        `${year}年 ${month + 1}月`;

      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      week.forEach(w => {
        const div = document.createElement("div");
        div.textContent = w;
        div.className = "weekday";
        grid.appendChild(div);
      });

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement("div"));
      }

      for (let d = 1; d <= lastDate; d++) {
        const div = document.createElement("div");
        div.textContent = d;

        const dateString =
            `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

        div.onclick = () => openDateMenu(dateString);

        // 予定がある日なら表示
        if (schedules[dateString] && schedules[dateString].length > 0) {
            const eventDiv = document.createElement("div");
            eventDiv.className = "calendar-event";
            eventDiv.textContent = schedules[dateString][0].title;
            div.appendChild(eventDiv);
        }

        grid.appendChild(div);
        }

    }

    function prevMonth() {
      current.setMonth(current.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      current.setMonth(current.getMonth() + 1);
      renderCalendar();
    }

    renderCalendar();

    function openDateMenu(dateString) {
      selectedDate = dateString;
      document.getElementById("dateMenuDate").textContent =
        `${dateString} の操作`;
      document.getElementById("dateMenu").style.display = "flex";
    }

    function closeAllPopups() {
      document.getElementById("dateMenu").style.display = "none";
      document.getElementById("addSchedulePopup").style.display = "none";
      document.getElementById("scheduleListPopup").style.display = "none";
    }

    function openAddSchedule() {
      document.getElementById("dateMenu").style.display = "none";
      document.getElementById("addSchedulePopup").style.display = "flex";
    }

    function saveSchedule() {
      const title = document.getElementById("scheduleTitle").value;
      const memo = document.getElementById("scheduleMemo").value;

      if (!title) return alert("タイトルを入力してください");

      if (!schedules[selectedDate]) schedules[selectedDate] = [];

      schedules[selectedDate].push({ title, memo });

      document.getElementById("scheduleTitle").value = "";
      document.getElementById("scheduleMemo").value = "";

      closeAllPopups();
      renderCalendar();
    }

    function openScheduleList() {
      document.getElementById("dateMenu").style.display = "none";

      document.getElementById("scheduleListDate").textContent =
        `${selectedDate} の予定`;

      const list = schedules[selectedDate] || [];
      const box = document.getElementById("scheduleListBox");
      box.innerHTML = "";

      list.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "schedule-item";
        div.innerHTML = `
          <div>
            <div class="schedule-title">${item.title}</div>
            <div class="schedule-memo">${item.memo}</div>
          </div>
          <button onclick="deleteSchedule(${index})">削除</button>
        `;
        box.appendChild(div);
      });

      document.getElementById("scheduleListPopup").style.display = "flex";
    }

    function deleteSchedule(index) {
      schedules[selectedDate].splice(index, 1);
      openScheduleList();
      renderCalendar();
    }
  </script>

</body>
</html>
